<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- GitHub Pages serves HTML with cache-control: max-age=600 and we can't
         override server headers. These meta hints push compliant browsers to
         revalidate the entry HTML on each navigation so a redeploy doesn't
         get masked by a 10-minute stale cache. The hashed JS/CSS bundle is
         still cached normally — only this HTML revalidates. -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="app-build" content="%VITE_BUILD_ID%" />
    <title>Optro · TPRM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
      // Companion to public/404.html — if we were redirected here from a
      // deep link via GitHub Pages' 404 handler, rewrite the URL back to
      // the original deep-link path so React Router resolves it normally.
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, '', l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
